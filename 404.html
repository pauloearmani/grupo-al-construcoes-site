<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página não encontrada | Grupo AL Construções</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico"/>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 60%, #0d2e5a 100%);
      padding: 40px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-404::before {
      content: '404';
      position: absolute;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(180px, 30vw, 320px);
      font-weight: 800;
      color: rgba(255,255,255,0.03);
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .content-404 {
      position: relative; z-index: 2;
      animation: fadeUp .8s ease both;
    }
    .badge-404 {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 6rem; font-weight: 800;
      color: var(--gold);
      line-height: 1; margin-bottom: 16px;
    }
    .content-404 h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800; color: var(--white);
      margin-bottom: 16px;
    }
    .content-404 p {
      font-size: 1.05rem; color: rgba(255,255,255,0.7);
      max-width: 480px; margin: 0 auto 40px;
      line-height: 1.7;
    }
    .btns-404 {
      display: flex; gap: 16px;
      justify-content: center; flex-wrap: wrap;
    }
    .btn-home {
      display: inline-block;
      background: var(--blue-accent); color: var(--white);
      font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 1rem;
      padding: 14px 36px; border-radius: 8px; text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .btn-home:hover { background: var(--blue-mid); transform: translateY(-2px); }
    .btn-contact {
      display: inline-block;
      background: transparent; color: var(--white);
      border: 2px solid rgba(255,255,255,0.4);
      font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 1rem;
      padding: 14px 36px; border-radius: 8px; text-decoration: none;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .btn-contact:hover { background: rgba(255,255,255,0.1); border-color: var(--white); transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="page-404">
    <div class="content-404">
      <div class="badge-404">404</div>
      <h1 data-i18n="err_title">Página não encontrada</h1>
      <p data-i18n="err_sub">O endereço que você tentou acessar não existe ou foi removido. Mas não se preocupe, você pode voltar para a página inicial.</p>
      <div class="btns-404">
        <a href="index.html" class="btn-home" data-i18n="err_btn_home">Voltar para o início</a>
        <a href="contato.html" class="btn-contact" data-i18n="err_btn_contact">Falar conosco</a>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const extra = {
        pt: {
          err_title: "Página não encontrada",
          err_sub: "O endereço que você tentou acessar não existe ou foi removido. Mas não se preocupe, você pode voltar para a página inicial.",
          err_btn_home: "Voltar para o início",
          err_btn_contact: "Falar conosco",
        },
        en: {
          err_title: "Page not found",
          err_sub: "The address you tried to access does not exist or has been removed. Don't worry, you can go back to the home page.",
          err_btn_home: "Back to home",
          err_btn_contact: "Contact us",
        },
        es: {
          err_title: "Página no encontrada",
          err_sub: "La dirección que intentó acceder no existe o fue eliminada. No se preocupe, puede volver a la página de inicio.",
          err_btn_home: "Volver al inicio",
          err_btn_contact: "Contáctenos",
        }
      };
      ['pt','en','es'].forEach(lang => Object.assign(T[lang], extra[lang]));
      applyLang();
    });
  </script>

</body>
</html>
